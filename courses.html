<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>holberton-smiling</title>
    <!-- Custom and Font Styles  -->
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="font-style.css" />
    <link rel="icon" href="images/favicon.ico" type="image/x-icon" />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css?family=Source+Sans+Pro&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Coiny&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap -->
    <script
      src="https://code.jquery.com/jquery-3.4.1.min.js"
      integrity="sha256-CSXorXvZcTkaix6Yvo6HppcZGetbYMGWSFlBw8HfCJo="
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"
      integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"
      integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6"
      crossorigin="anonymous"
    ></script>

    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
      integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
      crossorigin="anonymous"
    />
  </head>
  <body class="body">
    <header class="header courses-header">
      <div class="container">
        <nav class="navbar navbar-expand-sm navbar-dark pt-4 px-0">
          <button
            class="navbar-toggler border-0 align-self-start mt-3"
            type="button"
            data-toggle="collapse"
            data-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-line1"></span>
            <span class="navbar-line2 my-1"></span>
            <span class="navbar-line3"></span>
          </button>
          <a
            class="navbar-brand mx-auto d-flex flex-column flex-sm-row align-items-center mt-3"
            href="homepage.html"
          >
            <img
              src="images/smile_off.png"
              alt="navbar-logo"
              width="37px"
              class="mr-4 mb-3 mb-sm-0 mr-sm-3 img-fluid"
            />
            <img
              src="images/logo.png"
              alt="navbar-logo-text"
              width="114px"
              class="mr-4 img-fluid"
            />
          </a>
          <div class="collapse navbar-collapse text-center mt-3" id="navbarNav">
            <ul class="navbar-nav ml-auto font-weight-bold">
              <li class="nav-item">
                <a class="nav-link text-white px-1" href="courses.html">COURSES</a>
              </li>
              <li class="nav-item px-0 px-sm-5 py-2 py-sm-0">
                <a class="nav-link text-white px-1" href="pricing.html">PRICING</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-white px-1" href="#">LOGIN</a>
              </li>
            </ul>
          </div>
        </nav>

        <section class="hero text-center text-white d-none d-sm-block">
          <h1 class="my-0">
            « Don't cry because it's over.<br /><span class="main-color">Smile</span>
            because it happened. »
          </h1>
        </section>
      </div>
    </header>

    <main>
      <section class="section search">
        <div class="container">
          <div class="row py-4">
            <div class="col-12 col-sm-12 col-lg-4 box1">
              <span class="text-white font-weight-bold drop-down-title">KEYWORDS</span>
              <div class="input-group mb-sm-4">
                <div class="input-group-prepend">
                  <span class="input-group-text holberton_school-icon-search_1"></span>
                </div>
                <input
                  id="search-input"
                  type="text"
                  class="form-control search-text-area"
                  aria-label="Default"
                  aria-describedby="inputGroup-sizing-default"
                  placeholder="Search by keywords"
                />
              </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4 box2">
              <span class="text-white font-weight-bold drop-down-title">TOPIC</span>
              <div class="dropdown">
                <a
                  class="btn dropdown-toggle text-left"
                  href="#"
                  role="button"
                  id="topic-dropdown"
                  data-toggle="dropdown"
                  aria-haspopup="true"
                  aria-expanded="false"
                >
                  <span id="topic-selected">All</span>
                </a>
                <div class="dropdown-menu mt-0" aria-labelledby="topic-dropdown" id="topic-menu"></div>
              </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4 box3">
              <span class="text-white font-weight-bold drop-down-title">SORT BY</span>
              <div class="dropdown">
                <a
                  class="btn dropdown-toggle text-left"
                  href="#"
                  role="button"
                  id="sort-dropdown"
                  data-toggle="dropdown"
                  aria-haspopup="true"
                  aria-expanded="false"
                >
                  <span id="sort-selected">Most Popular</span>
                </a>
                <div class="dropdown-menu mt-0" aria-labelledby="sort-dropdown" id="sort-menu"></div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="section results">
        <div class="container">
          <div class="section-title">
            <span class="text-muted video-count" id="video-count"></span>
          </div>

          <div id="courses-loader" class="loader"></div>

          <div class="row" id="courses-grid"></div>
        </div>
      </section>
    </main>

    <footer class="footer d-flex align-items-center justify-content-center">
      <div class="container">
        <div class="row d-flex align-items-center flex-column flex-sm-row">
          <div class="col footer-item d-flex justify-content-center justify-content-sm-start">
            <div class="footer-logo">
              <img src="images/smile_off.png" alt="navbar-logo" width="37px" class="mr-4 mb-3 mb-sm-0 mr-sm-3 img-fluid" />
              <img src="images/logo.png" alt="navbar-logo-text" width="114px" class="mr-4 img-fluid" />
            </div>
          </div>
          <div class="col d-flex align-items-end align-self-sm-end justify-content-center order-2 order-sm-0 footer-item">
            <div class="trademark text-muted">
              <span>©smileschool 2020</span>
            </div>
          </div>
          <div class="col d-flex align-items-center align-items-sm-end justify-content-center justify-content-sm-end footer-item">
            <div class="social">
              <ul class="social nav">
                <li class="social-item facebook-icon">
                  <a href="https://www.facebook.com/HolbertonSchool/" class="social-link" aria-label="Facebook">
                    <span class="holberton_school-icon-ic_facebook"></span>
                  </a>
                </li>
                <li class="social-item twitter-icon">
                  <a href="https://twitter.com/holbertonschool" class="social-link" aria-label="Twitter">
                    <span class="holberton_school-icon-ic_twitter"></span>
                  </a>
                </li>
                <li class="social-item instagram-icon">
                  <a href="https://www.instagram.com/holbertonschool/" class="social-link" aria-label="Instagram">
                    <span class="holberton_school-icon-ic_instagram"></span>
                  </a>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </footer>

    <script>
      var currentQ = '';
      var currentTopic = '';
      var currentSort = '';
      var searchTimeout = null;
      var dropdownsBuilt = false;

      $(document).ready(function () {
        loadCourses();

        $('#search-input').on('input', function () {
          clearTimeout(searchTimeout);
          searchTimeout = setTimeout(function () {
            currentQ = $('#search-input').val();
            loadCourses();
          }, 300);
        });
      });

      function loadCourses() {
        $('#courses-loader').show();
        $('#courses-grid').empty();
        $('#video-count').text('');

        $.ajax({
          url: 'https://smileschool-api.hbtn.info/courses',
          method: 'GET',
          data: {
            q: currentQ,
            topic: currentTopic,
            sort: currentSort
          },
          success: function (data) {
            // Dropdowns construits une seule fois au premier appel
            if (!dropdownsBuilt) {
              buildDropdown('#topic-menu', '#topic-selected', data.topics, function (val) {
                currentTopic = val;
                loadCourses();
              });
              buildDropdown('#sort-menu', '#sort-selected', data.sorts, function (val) {
                currentSort = val;
                loadCourses();
              });
              dropdownsBuilt = true;
            }

            // Sync champ search avec q retourné par l'API
            if (data.q !== undefined) {
              $('#search-input').val(data.q);
              currentQ = data.q;
            }

            // Compteur
            $('#video-count').text(data.courses.length + ' video' + (data.courses.length !== 1 ? 's' : ''));

            // Cartes
            var $grid = $('#courses-grid');
            data.courses.forEach(function (video) {
              var stars = '';
              for (var i = 1; i <= 5; i++) {
                stars += '<img src="images/' + (i <= video.star ? 'star_on.png' : 'star_off.png') + '" alt="star" width="15px" />';
              }

              var $card = $('<div class="col-12 col-sm-4 col-lg-3 d-flex justify-content-center"></div>');
              $card.html(
                '<div class="card">' +
                  '<img src="' + video.thumb_url + '" class="card-img-top" alt="Video thumbnail" />' +
                  '<div class="card-img-overlay text-center">' +
                    '<img src="images/play.png" alt="Play" width="64px" class="align-self-center play-overlay" />' +
                  '</div>' +
                  '<div class="card-body">' +
                    '<h5 class="card-title font-weight-bold">' + video.title + '</h5>' +
                    '<p class="card-text text-muted">' + video['sub-title'] + '</p>' +
                    '<div class="creator d-flex align-items-center">' +
                      '<img src="' + video.author_pic_url + '" alt="Creator" width="30px" class="rounded-circle" />' +
                      '<h6 class="pl-3 m-0 main-color">' + video.author + '</h6>' +
                    '</div>' +
                    '<div class="info pt-3 d-flex justify-content-between">' +
                      '<div class="rating">' + stars + '</div>' +
                      '<span class="main-color">' + video.duration + '</span>' +
                    '</div>' +
                  '</div>' +
                '</div>'
              );
              $grid.append($card);
            });

            $('#courses-loader').hide();
          },
          error: function () {
            $('#courses-loader').hide();
            $('#courses-grid').html('<div class="text-center w-100">Failed to load courses.</div>');
          }
        });
      }

      function buildDropdown(menuId, selectedId, items, onSelect) {
        var $menu = $(menuId);
        $menu.empty();

        items.forEach(function (item) {
          var $a = $('<a class="dropdown-item" href="#">' + item + '</a>');
          $a.on('click', function (e) {
            e.preventDefault();
            $(selectedId).text(item);
            onSelect(item);
          });
          $menu.append($a);
        });

        // Affiche le premier item par défaut
        if (items.length > 0) {
          $(selectedId).text(items[0]);
        }
      }
    </script>

  </body>
</html>
